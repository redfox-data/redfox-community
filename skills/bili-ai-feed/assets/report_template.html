<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站AI信息源 - {{DATE}}</title>

<!-- Fonts: Archivo Black (display) + Space Grotesk (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   CSS CUSTOM PROPERTIES — BILIBILI BRAND PRESET
   ═══════════════════════════════════════════════ */
:root {
    --bg-primary: #0f0f0f;
    --bg-secondary: #1a1a1a;
    --bg-card: #1e1e1e;
    --bg-card-hover: #252525;
    --text-primary: #f0ece6;
    --text-secondary: #9a9590;
    --text-muted: #666;
    --accent: #FB7299;
    --accent-light: #FB93B5;
    --accent-glow: rgba(251, 114, 153, 0.15);
    --accent-border: rgba(251, 114, 153, 0.3);
    --border: rgba(255, 255, 255, 0.06);

    --font-display: 'Archivo Black', Impact, sans-serif;
    --font-body: 'Space Grotesk', -apple-system, sans-serif;

    --title-size: clamp(1.8rem, 4vw, 3.5rem);
    --h2-size: clamp(1.2rem, 2.5vw, 1.8rem);
    --h3-size: clamp(1rem, 1.8vw, 1.3rem);
    --body-size: clamp(0.8rem, 1.2vw, 0.95rem);
    --small-size: clamp(0.7rem, 0.9vw, 0.8rem);

    --radius: 12px;
    --radius-sm: 8px;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: var(--font-body);
    font-size: var(--body-size);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    padding: clamp(1rem, 3vw, 3rem);
}

/* ═══════════════════════════════════════════════
   HEADER — DATE PROMINENT
   ═══════════════════════════════════════════════ */
.report-header {
    text-align: center;
    padding: clamp(2rem, 5vw, 4rem) 0 clamp(1rem, 2vw, 1.5rem);
    max-width: 900px;
    margin: 0 auto;
}

.report-header h1 {
    font-family: var(--font-display);
    font-size: var(--title-size);
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
}

.report-header .subtitle {
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 1.2rem;
}

/* 大日期显示 */
.date-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1.2rem 0;
}

.date-display .date-text {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3vw, 2.4rem);
    color: var(--text-primary);
    letter-spacing: 0.02em;
}

.date-nav-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.date-nav-btn:hover {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-glow);
}

.article-count-badge {
    display: inline-block;
    margin-top: 0.6rem;
    padding: 0.3rem 1rem;
    background: var(--accent-glow);
    border: 1px solid var(--accent-border);
    border-radius: 20px;
    font-size: var(--small-size);
    color: var(--accent-light);
    font-weight: 500;
}



/* ═══════════════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════════════ */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: clamp(1.5rem, 4vw, 3rem);
    padding: clamp(1rem, 2vw, 1.5rem) clamp(1rem, 3vw, 2rem);
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    max-width: 700px;
    margin: clamp(1.5rem, 3vw, 2rem) auto clamp(2rem, 4vw, 3rem);
    flex-wrap: wrap;
}

.stat-item {
    text-align: center;
    min-width: 80px;
}

.stat-value {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: var(--accent);
    line-height: 1.2;
}

.stat-label {
    font-size: var(--small-size);
    color: var(--text-secondary);
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   CATEGORY CARDS GRID
   ═══════════════════════════════════════════════ */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    gap: clamp(1rem, 2vw, 1.5rem);
    max-width: 1200px;
    margin: 0 auto;
}

.category-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s var(--ease-out-expo), border-color 0.3s ease;
}

.category-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-border);
}

.category-card.hidden {
    display: none;
}

.card-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: clamp(1rem, 2vw, 1.3rem) clamp(1rem, 2vw, 1.5rem);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
}

.card-number {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: rgba(0, 0, 0, 0.3);
    line-height: 1;
}

.card-category {
    flex: 1;
    font-family: var(--font-body);
    font-size: var(--h3-size);
    font-weight: 700;
    color: #fff;
}

.card-count {
    font-size: var(--small-size);
    color: rgba(255, 255, 255, 0.8);
    font-weight: 500;
    background: rgba(0, 0, 0, 0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
}

.card-body {
    padding: clamp(0.8rem, 1.5vw, 1.2rem) clamp(1rem, 2vw, 1.5rem);
}

/* ═══════════════════════════════════════════════
   ARTICLE ITEMS
   ═══════════════════════════════════════════════ */
.article-item {
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
}

.article-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.article-cover {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-secondary);
}

.article-info {
    flex: 1;
    min-width: 0;
}

.article-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
    text-decoration: none;
    font-size: var(--body-size);
    font-weight: 500;
    line-height: 1.5;
    transition: color 0.2s ease;
}

.article-title:hover {
    color: var(--accent);
}

.article-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.3rem;
    font-size: var(--small-size);
    color: var(--text-muted);
    flex-wrap: wrap;
    gap: 0.3rem;
}

.author {
    color: var(--text-secondary);
}

.metrics {
    display: flex;
    gap: 0.8rem;
}

.metric {
    white-space: nowrap;
}



/* ═══════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════ */
.report-footer {
    text-align: center;
    padding: clamp(2rem, 4vw, 3rem) 0 1rem;
    color: var(--text-muted);
    font-size: var(--small-size);
}

.report-footer .powered {
    margin-top: 0.5rem;
    color: var(--text-secondary);
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

.category-card:nth-child(1) { transition-delay: 0.05s; }
.category-card:nth-child(2) { transition-delay: 0.1s; }
.category-card:nth-child(3) { transition-delay: 0.15s; }
.category-card:nth-child(4) { transition-delay: 0.2s; }
.category-card:nth-child(5) { transition-delay: 0.25s; }
.category-card:nth-child(6) { transition-delay: 0.3s; }
.category-card:nth-child(7) { transition-delay: 0.35s; }
.category-card:nth-child(8) { transition-delay: 0.4s; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 600px) {
    .stats-bar {
        gap: 1rem;
    }
    .stat-item {
        min-width: 60px;
    }
    .cards-grid {
        grid-template-columns: 1fr;
    }
    .date-display .date-text {
        font-size: 1.3rem;
    }
    .article-cover {
        width: 56px;
        height: 56px;
    }
}

@media (prefers-reduced-motion: reduce) {
    .reveal {
        opacity: 1;
        transform: none;
        transition: none;
    }
}

/* ═══════════════════════════════════════════════
   INTELLIGENCE SECTION — AI情报调查报告
   ═══════════════════════════════════════════════ */
.intelligence-section {
    max-width: 1200px;
    margin: 3rem auto 0;
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--accent-border);
    overflow: hidden;
}

.intel-header {
    padding: clamp(1.2rem, 2vw, 1.8rem) clamp(1.2rem, 2vw, 1.8rem);
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 2px solid var(--accent-border);
}

.intel-title {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: var(--accent-light);
    margin-bottom: 0.3rem;
}

.intel-subtitle-badge {
    font-size: var(--small-size);
    color: var(--text-secondary);
    background: rgba(251, 114, 153, 0.1);
    padding: 0.15rem 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--accent-border);
}

.intel-body {
    padding: clamp(1rem, 2vw, 1.5rem);
}

.intel-subsection {
    margin-bottom: 1.5rem;
}

.intel-subsection:last-child {
    margin-bottom: 0;
}

.intel-subtitle {
    font-size: var(--body-size);
    font-weight: 600;
    color: var(--accent-light);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
}

/* 热度排行 */
.intel-rank-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.intel-rank-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.6rem 0.8rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    transition: background 0.2s ease;
}

.intel-rank-item:hover {
    background: var(--bg-card-hover);
}

.intel-rank-num {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--accent);
    min-width: 1.5rem;
    text-align: center;
}

.intel-rank-info {
    flex: 1;
    min-width: 0;
}

.intel-rank-topic {
    display: block;
    font-weight: 600;
    color: var(--text-primary);
    font-size: var(--body-size);
}

.intel-rank-detail {
    display: block;
    font-size: var(--small-size);
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.intel-rank-metric {
    font-size: var(--small-size);
    color: var(--accent-light);
    font-weight: 500;
    white-space: nowrap;
}

/* 新兴起量 */
.intel-emerging-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
}

.intel-emerging-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.8rem;
    background: rgba(251, 114, 153, 0.08);
    border: 1px solid var(--accent-border);
    border-radius: 20px;
}

.intel-emerging-badge {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    text-transform: uppercase;
}

.intel-emerging-topic {
    font-weight: 600;
    color: var(--text-primary);
    font-size: var(--small-size);
}

.intel-emerging-detail {
    font-size: var(--small-size);
    color: var(--text-muted);
}

/* 核心达人 */
.intel-author-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.intel-author-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.8rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
}

.intel-author-name {
    font-weight: 600;
    color: var(--accent-light);
    font-size: var(--small-size);
}

.intel-author-stats {
    font-size: var(--small-size);
    color: var(--text-muted);
}

/* ═══════════════════════════════════════════════
   调查报告卡片 — 每个TOP话题一张
   ═══════════════════════════════════════════════ */
.intel-report-card {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 1.2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: box-shadow 0.2s ease;
}

.intel-report-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}

.intel-report-card:last-child {
    margin-bottom: 0;
}

.intel-report-head {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.9rem 1.2rem;
    background: linear-gradient(135deg, rgba(251, 114, 153, 0.15) 0%, rgba(251, 114, 153, 0.04) 100%);
    border-bottom: 1px solid var(--border);
}

.intel-report-topic {
    font-family: var(--font-display);
    font-size: 1.15rem;
    color: var(--accent-light);
    flex: 1;
    font-weight: 700;
}

.intel-report-mode {
    font-size: var(--small-size);
    font-weight: 600;
    color: var(--accent-light);
    background: rgba(251, 114, 153, 0.18);
    padding: 0.2rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--accent-border);
}

.intel-report-engines {
    font-size: var(--small-size);
    color: var(--text-muted);
    white-space: nowrap;
}

.intel-report-body {
    padding: 1rem 1.2rem;
}

/* 调查场景标签 */
.intel-report-scenario {
    display: inline-block;
    font-size: 0.72rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.6rem;
    border: 1px solid var(--border);
}

/* 调查发现表 */
.intel-findings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--small-size);
    margin-bottom: 1rem;
}

.intel-findings-table th {
    text-align: left;
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--accent-border);
    color: var(--accent-light);
    font-weight: 600;
    white-space: nowrap;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
}

.intel-findings-table td {
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    line-height: 1.5;
}

.intel-findings-table td:first-child {
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    width: 72px;
}

.intel-findings-table td:nth-child(2) {
    /* 发现列占最大空间 */
}

.intel-findings-table td:nth-child(3) {
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 0.72rem;
}

.intel-findings-table td:nth-child(4) {
    text-align: center;
    width: 56px;
}

.intel-cred-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.7rem;
}

.intel-cred-a { background: rgba(72, 187, 120, 0.15); color: #48bb78; }
.intel-cred-b { background: rgba(66, 153, 225, 0.15); color: #4299e1; }
.intel-cred-c { background: rgba(237, 137, 54, 0.15); color: #ed8936; }
.intel-cred-d { background: rgba(245, 101, 101, 0.15); color: #f56565; }

/* 关键结论 */
.intel-conclusion-title {
    font-size: var(--small-size);
    font-weight: 700;
    color: var(--accent-light);
    margin-bottom: 0.5rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--border);
}

.intel-conclusion-list {
    list-style: none;
    padding: 0;
    margin: 0;
    background: rgba(255,255,255,0.02);
    border-radius: var(--radius-sm);
    padding: 0.5rem 0.7rem;
}

.intel-conclusion-item {
    padding: 0.3rem 0;
    font-size: var(--small-size);
    color: var(--text-secondary);
    line-height: 1.6;
}

.intel-conclusion-confirmed { color: #48bb78; }
.intel-conclusion-pending { color: #ed8936; }
.intel-conclusion-denied { color: #f56565; }
.intel-conclusion-single { color: var(--text-muted); }

/* 跨平台对比 */
.intel-cross-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.intel-cross-tip {
    padding: 0.5rem 0.8rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    font-size: var(--small-size);
    color: var(--text-secondary);
    line-height: 1.5;
}

/* 可信度标注规范（紧凑版） */
.intel-cred-ref {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    padding: 0.6rem 0.8rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    font-size: var(--small-size);
}

.intel-cred-ref-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    color: var(--text-secondary);
}

.intel-cred-ref-item .intel-cred-badge {
    margin-right: 0.2rem;
}

.intel-cred-ref-label {
    color: var(--text-muted);
    font-size: 0.7rem;
}

@media (max-width: 600px) {
    .intel-report-head {
        flex-wrap: wrap;
    }
    .intel-report-engines {
        width: 100%;
    }
    .intel-findings-table {
        font-size: 0.7rem;
    }
    .intel-findings-table td,
    .intel-findings-table th {
        padding: 0.3rem 0.3rem;
    }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="report-header">
    <h1>B站AI信息源</h1>
    <p class="subtitle">每日热门内容聚类 · 点赞量靠前的 AI 爆款一网打尽</p>

    <!-- 大日期 + 前后切换 -->
    <div class="date-display">
        <button class="date-nav-btn" id="prevDay" title="前一天">&larr;</button>
        <span class="date-text">{{DATE_CN}}</span>
        <button class="date-nav-btn" id="nextDay" title="后一天">&rarr;</button>
    </div>

    <span class="article-count-badge">共 {{TOTAL_COUNT}} 条热门视频</span>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value">{{TOPIC_COUNT}}</div>
        <div class="stat-label">分类</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_COUNT}}</div>
        <div class="stat-label">视频</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{AVG_LIKES}}</div>
        <div class="stat-label">平均点赞</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_LIKES}}</div>
        <div class="stat-label">总点赞</div>
    </div>
</div>

<!-- CATEGORY CARDS -->
<div class="cards-grid" id="cardsGrid">
{{CATEGORY_CARDS}}
</div>



<!-- INTELLIGENCE SECTION -->
{{INTELLIGENCE_SECTION}}



<!-- FOOTER -->
<footer class="report-footer">
    <p>Generated at {{TIMESTAMP}}</p>
    <p class="powered">Powered by B站AI信息源 Skill</p>
</footer>

<!-- SCRIPTS -->
<script>
(function() {
    // ── Scroll reveal animation ──
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
    });

    // ── Date navigation ──
    var currentDate = '{{DATE}}';
    function navigateDate(offset) {
        var parts = currentDate.split('-');
        var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        d.setDate(d.getDate() + offset);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        var newDate = y + '-' + m + '-' + day;
        var newFile = 'AI-B站日报_' + newDate + '.html';
        window.location.href = newFile;
    }

    document.getElementById('prevDay').addEventListener('click', function() {
        navigateDate(-1);
    });
    document.getElementById('nextDay').addEventListener('click', function() {
        navigateDate(1);
    });
})();
</script>

</body>
</html>
