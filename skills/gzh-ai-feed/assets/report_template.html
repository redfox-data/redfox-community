<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI公众号信息源 - {{DATE}}</title>

<!-- Fonts: Archivo Black (display) + Space Grotesk (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   CSS CUSTOM PROPERTIES — BOLD SIGNAL PRESET
   ═══════════════════════════════════════════════ */
:root {
    --bg-primary: #0f0f0f;
    --bg-secondary: #1a1a1a;
    --bg-card: #1e1e1e;
    --bg-card-hover: #252525;
    --text-primary: #f0ece6;
    --text-secondary: #9a9590;
    --text-muted: #666;
    --accent: #FF5722;
    --accent-light: #FF7043;
    --accent-glow: rgba(255, 87, 34, 0.15);
    --accent-border: rgba(255, 87, 34, 0.3);
    --border: rgba(255, 255, 255, 0.06);

    --font-display: 'Archivo Black', Impact, sans-serif;
    --font-body: 'Space Grotesk', -apple-system, sans-serif;

    --title-size: clamp(1.8rem, 4vw, 3.5rem);
    --h2-size: clamp(1.2rem, 2.5vw, 1.8rem);
    --h3-size: clamp(1rem, 1.8vw, 1.3rem);
    --body-size: clamp(0.8rem, 1.2vw, 0.95rem);
    --small-size: clamp(0.7rem, 0.9vw, 0.8rem);

    --radius: 12px;
    --radius-sm: 8px;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: var(--font-body);
    font-size: var(--body-size);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    padding: clamp(1rem, 3vw, 3rem);
}

/* ═══════════════════════════════════════════════
   HEADER — DATE PROMINENT
   ═══════════════════════════════════════════════ */
.report-header {
    text-align: center;
    padding: clamp(2rem, 5vw, 4rem) 0 clamp(1rem, 2vw, 1.5rem);
    max-width: 900px;
    margin: 0 auto;
}

.report-header h1 {
    font-family: var(--font-display);
    font-size: var(--title-size);
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
}

.report-header .subtitle {
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 1.2rem;
}

/* 大日期显示 */
.date-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1.2rem 0;
}

.date-display .date-text {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3vw, 2.4rem);
    color: var(--text-primary);
    letter-spacing: 0.02em;
}

.date-nav-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.date-nav-btn:hover {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-glow);
}

.article-count-badge {
    display: inline-block;
    margin-top: 0.6rem;
    padding: 0.3rem 1rem;
    background: var(--accent-glow);
    border: 1px solid var(--accent-border);
    border-radius: 20px;
    font-size: var(--small-size);
    color: var(--accent-light);
    font-weight: 500;
}

/* ═══════════════════════════════════════════════
   SEARCH BAR
   ═══════════════════════════════════════════════ */
.search-bar {
    max-width: 500px;
    margin: 1.5rem auto 0;
    position: relative;
}

.search-bar input {
    width: 100%;
    padding: 0.7rem 1.2rem 0.7rem 2.8rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text-primary);
    font-size: var(--body-size);
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.2s ease;
}

.search-bar input::placeholder {
    color: var(--text-muted);
}

.search-bar input:focus {
    border-color: var(--accent-border);
}

.search-bar .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
}

/* ═══════════════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════════════ */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: clamp(1.5rem, 4vw, 3rem);
    padding: clamp(1rem, 2vw, 1.5rem) clamp(1rem, 3vw, 2rem);
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    max-width: 700px;
    margin: clamp(1.5rem, 3vw, 2rem) auto clamp(2rem, 4vw, 3rem);
    flex-wrap: wrap;
}

.stat-item {
    text-align: center;
    min-width: 80px;
}

.stat-value {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: var(--accent);
    line-height: 1.2;
}

.stat-label {
    font-size: var(--small-size);
    color: var(--text-secondary);
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   CATEGORY CARDS GRID
   ═══════════════════════════════════════════════ */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    gap: clamp(1rem, 2vw, 1.5rem);
    max-width: 1200px;
    margin: 0 auto;
}

.category-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s var(--ease-out-expo), border-color 0.3s ease;
}

.category-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-border);
}

.category-card.hidden {
    display: none;
}

.card-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: clamp(1rem, 2vw, 1.3rem) clamp(1rem, 2vw, 1.5rem);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
}

.card-number {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: rgba(0, 0, 0, 0.3);
    line-height: 1;
}

.card-category {
    flex: 1;
    font-family: var(--font-body);
    font-size: var(--h3-size);
    font-weight: 700;
    color: #fff;
}

.card-count {
    font-size: var(--small-size);
    color: rgba(255, 255, 255, 0.8);
    font-weight: 500;
    background: rgba(0, 0, 0, 0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
}

.card-body {
    padding: clamp(0.8rem, 1.5vw, 1.2rem) clamp(1rem, 2vw, 1.5rem);
}

/* ═══════════════════════════════════════════════
   ARTICLE ITEMS
   ═══════════════════════════════════════════════ */
.article-item {
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
}

.article-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.article-cover {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-secondary);
}

.article-info {
    flex: 1;
    min-width: 0;
}

.article-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
    text-decoration: none;
    font-size: var(--body-size);
    font-weight: 500;
    line-height: 1.5;
    transition: color 0.2s ease;
}

.article-title:hover {
    color: var(--accent);
}

.article-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.3rem;
    font-size: var(--small-size);
    color: var(--text-muted);
    flex-wrap: wrap;
    gap: 0.3rem;
}

.author {
    color: var(--text-secondary);
}

.metrics {
    display: flex;
    gap: 0.8rem;
}

.metric {
    white-space: nowrap;
}

/* ═══════════════════════════════════════════════
   NO RESULTS / SEARCH RESULTS
   ═══════════════════════════════════════════════ */
.no-results {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 1.1rem;
    display: none;
}

.no-results.visible {
    display: block;
}

/* Search results overlay */
.search-results {
    display: none;
    max-width: 800px;
    margin: 2rem auto;
}

.search-results.active {
    display: block;
}

.search-results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--accent-border);
}

.search-results-header h3 {
    font-family: var(--font-display);
    font-size: var(--h3-size);
    color: var(--accent-light);
}

.search-results-count {
    font-size: var(--small-size);
    color: var(--text-secondary);
}

.search-result-item {
    display: flex;
    gap: 0.8rem;
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
    transition: background 0.2s ease;
}

.search-result-item:hover {
    background: var(--bg-card-hover);
}

.search-result-item .article-cover {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-secondary);
}

.search-result-info {
    flex: 1;
    min-width: 0;
}

.search-result-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
    text-decoration: none;
    font-size: var(--body-size);
    font-weight: 500;
    line-height: 1.5;
    transition: color 0.2s ease;
}

.search-result-title:hover {
    color: var(--accent);
}

.search-result-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.3rem;
    font-size: var(--small-size);
    color: var(--text-muted);
    flex-wrap: wrap;
    gap: 0.3rem;
}

.search-loading {
    text-align: center;
    padding: 2rem;
    color: var(--text-secondary);
    display: none;
}

.search-loading.visible {
    display: block;
}

.search-error {
    text-align: center;
    padding: 2rem;
    color: var(--accent);
    display: none;
}

.search-error.visible {
    display: block;
}

/* ═══════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════ */
.report-footer {
    text-align: center;
    padding: clamp(2rem, 4vw, 3rem) 0 1rem;
    color: var(--text-muted);
    font-size: var(--small-size);
}

.report-footer .powered {
    margin-top: 0.5rem;
    color: var(--text-secondary);
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

.category-card:nth-child(1) { transition-delay: 0.05s; }
.category-card:nth-child(2) { transition-delay: 0.1s; }
.category-card:nth-child(3) { transition-delay: 0.15s; }
.category-card:nth-child(4) { transition-delay: 0.2s; }
.category-card:nth-child(5) { transition-delay: 0.25s; }
.category-card:nth-child(6) { transition-delay: 0.3s; }
.category-card:nth-child(7) { transition-delay: 0.35s; }
.category-card:nth-child(8) { transition-delay: 0.4s; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 600px) {
    .stats-bar {
        gap: 1rem;
    }
    .stat-item {
        min-width: 60px;
    }
    .cards-grid {
        grid-template-columns: 1fr;
    }
    .date-display .date-text {
        font-size: 1.3rem;
    }
    .article-cover {
        width: 56px;
        height: 56px;
    }
}

@media (prefers-reduced-motion: reduce) {
    .reveal {
        opacity: 1;
        transform: none;
        transition: none;
    }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="report-header">
    <h1>AI公众号信息源</h1>
    <p class="subtitle">每日热门内容聚类 · 阅读量靠前的 AI 爆款一网打尽</p>

    <!-- 大日期 + 前后切换 -->
    <div class="date-display">
        <button class="date-nav-btn" id="prevDay" title="前一天">&larr;</button>
        <span class="date-text">{{DATE_CN}}</span>
        <button class="date-nav-btn" id="nextDay" title="后一天">&rarr;</button>
    </div>

    <span class="article-count-badge">共 {{TOTAL_COUNT}} 篇热门文章</span>

    <!-- 搜索框 -->
    <div class="search-bar">
        <span class="search-icon">&#x1f50d;</span>
        <input type="text" id="searchInput" placeholder="搜索文章标题、作者或分类...">
    </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value">{{TOPIC_COUNT}}</div>
        <div class="stat-label">分类</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_COUNT}}</div>
        <div class="stat-label">文章</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{AVG_READS}}</div>
        <div class="stat-label">平均阅读</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_LIKES}}</div>
        <div class="stat-label">总点赞</div>
    </div>
</div>

<!-- CATEGORY CARDS -->
<div class="cards-grid" id="cardsGrid">
{{CATEGORY_CARDS}}
</div>

<!-- NO RESULTS -->
<div class="no-results" id="noResults">
    没有找到匹配的文章
</div>

<!-- SEARCH RESULTS (API-based, full library search) -->
<div class="search-results" id="searchResults">
    <div class="search-results-header">
        <h3>搜索结果</h3>
        <span class="search-results-count" id="searchCount"></span>
    </div>
    <div class="search-loading" id="searchLoading">搜索中...</div>
    <div class="search-error" id="searchError"></div>
    <div id="searchResultList"></div>
</div>

<!-- FOOTER -->
<footer class="report-footer">
    <p>Generated at {{TIMESTAMP}}</p>
    <p class="powered">Powered by AI公众号信息源 Skill</p>
</footer>

<!-- SCRIPTS -->
<script>
(function() {
    // ── 配置 ──
    var SEARCH_URL = '/api/search';
    var SEARCH_PAGE_SIZE = 20;

    // ── Scroll reveal animation ──
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
    });

    // ── DOM refs ──
    var searchInput = document.getElementById('searchInput');
    var cardsGrid = document.getElementById('cardsGrid');
    var noResults = document.getElementById('noResults');
    var searchResults = document.getElementById('searchResults');
    var searchLoading = document.getElementById('searchLoading');
    var searchError = document.getElementById('searchError');
    var searchResultList = document.getElementById('searchResultList');
    var searchCount = document.getElementById('searchCount');
    var statsBar = document.querySelector('.stats-bar');
    var articleBadge = document.querySelector('.article-count-badge');

    var searchTimer = null;
    var DEBOUNCE_MS = 500;

    // ── Format number helper ──
    function fmtNum(n) {
        if (!n) return '0';
        if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return String(n);
    }

    // ── Format time ──
    function fmtTime(dt) {
        if (!dt) return '';
        try {
            var d = new Date(dt.replace(/-/g, '/'));
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return m + '-' + day;
        } catch(e) {
            return dt.substring(0, 10);
        }
    }

    // ── Show daily report view ──
    function showReportView() {
        cardsGrid.style.display = '';
        statsBar.style.display = '';
        if (articleBadge) articleBadge.style.display = '';
        noResults.classList.remove('visible');
        searchResults.classList.remove('active');
        searchResultList.innerHTML = '';
    }

    // ── Show search results view ──
    function showSearchView() {
        cardsGrid.style.display = 'none';
        statsBar.style.display = 'none';
        if (articleBadge) articleBadge.style.display = 'none';
        noResults.classList.remove('visible');
        searchResults.classList.add('active');
    }

    // ── Search API call ──
    function doSearch(query) {
        showSearchView();

        // 检测 file:// 协议
        if (window.location.protocol === 'file:') {
            searchLoading.classList.remove('visible');
            searchError.innerHTML = '当前为离线模式。<br>请运行 <code>python3 daily_report.py</code> 启动搜索服务';
            searchError.classList.add('visible');
            return;
        }

        searchLoading.classList.add('visible');
        searchError.classList.remove('visible');
        searchResultList.innerHTML = '';

        fetch(SEARCH_URL + '?keyword=' + encodeURIComponent(query))
        .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
        })
        .then(function(data) {
            searchLoading.classList.remove('visible');

            var code = data.code || 0;
            if (code !== 200 && code !== 2000) {
                searchError.textContent = data.msg || '搜索失败，请稍后重试';
                searchError.classList.add('visible');
                return;
            }

            var articles = (data.data && data.data.list) || [];
            if (articles.length === 0) {
                searchError.textContent = '没有找到相关文章，试试换个关键词';
                searchError.classList.add('visible');
                searchCount.textContent = '';
                return;
            }

            searchCount.textContent = '找到 ' + articles.length + ' 篇相关文章';
            var html = '';
            articles.forEach(function(a) {
                var title = a.title || '无标题';
                var url = a.url || '#';
                var author = a.userName || '';
                var cover = a.coverUrl || '';
                var reads = fmtNum(a.readCount);
                var likes = fmtNum(a.likeCount);
                var time = fmtTime(a.gmtCreate);

                var coverHtml = cover
                    ? '<img class="article-cover" src="' + cover + '" alt="" loading="lazy" referrerpolicy="no-referrer">'
                    : '';

                html += '<div class="search-result-item">'
                    + coverHtml
                    + '<div class="search-result-info">'
                    + '<a href="' + url + '" target="_blank" class="search-result-title">' + title + '</a>'
                    + '<div class="search-result-meta">'
                    + '<span class="author">' + author + '</span>'
                    + '<span class="metrics">'
                    + '<span class="metric">&#x1f441; ' + reads + '</span>'
                    + '<span class="metric">&#x1f44d; ' + likes + '</span>'
                    + (time ? '<span class="metric">&#x1f4c5; ' + time + '</span>' : '')
                    + '</span></div></div></div>';
            });
            searchResultList.innerHTML = html;
        })
        .catch(function(err) {
            searchLoading.classList.remove('visible');
            if (window.location.protocol === 'file:') {
                searchError.textContent = '离线模式下无法搜索。请用 python3 daily_report.py 启动服务';
            } else {
                searchError.textContent = '搜索服务未启动。请在终端运行 python3 daily_report.py 后重试';
            }
            searchError.classList.add('visible');
        });
    }

    // ── Search input handler with debounce ──
    searchInput.addEventListener('input', function() {
        var query = this.value.trim();

        if (!query) {
            // Empty search → show daily report
            clearTimeout(searchTimer);
            showReportView();
            return;
        }

        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            doSearch(query);
        }, DEBOUNCE_MS);
    });

    // ── Date navigation ──
    var currentDate = '{{DATE}}';
    function navigateDate(offset) {
        var parts = currentDate.split('-');
        var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        d.setDate(d.getDate() + offset);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        var newDate = y + '-' + m + '-' + day;
        var newFile = 'AI日报_' + newDate + '.html';
        window.location.href = newFile;
    }

    document.getElementById('prevDay').addEventListener('click', function() {
        navigateDate(-1);
    });
    document.getElementById('nextDay').addEventListener('click', function() {
        navigateDate(1);
    });
})();
</script>

</body>
