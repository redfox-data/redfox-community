<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书作品爬取 · {{KEYWORD}} | {{DATE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf5f2; --bg-card: #ffffff; --bg-card-hover: #fff7f3;
  --text: #1a1a1a; --text-secondary: #6b6b6b; --text-muted: #9e9e9e;
  --accent: #ff2442; --accent-light: rgba(255,36,66,0.08);
  --accent-border: rgba(255,36,66,0.2); --border: rgba(0,0,0,0.06);
  --radius: 14px; --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-hover: 0 4px 20px rgba(255,36,66,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { text-align: center; padding: 2.5rem 1.5rem 1.2rem; background: linear-gradient(135deg, #ff2442 0%, #ff6b6b 100%); color: white; }
.header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
.header .sub { font-size: 0.85rem; opacity: 0.85; margin-top: 0.3rem; }

.stats-bar { display: flex; justify-content: center; gap: 2.5rem; padding: 1.2rem; flex-wrap: wrap;
  background: white; border-bottom: 1px solid var(--border); }
.stat-item { text-align: center; }
.stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

.toolbar { position: sticky; top: 0; z-index: 100; background: rgba(250,245,242,0.92);
  backdrop-filter: blur(12px); padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border); }
.toolbar-inner { max-width: 960px; margin: 0 auto; display: flex; gap: 0.7rem; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
.sort-btns { display: flex; gap: 0.4rem; }
.sort-btn { padding: 0.55rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius);
  background: white; font-size: 0.8rem; font-family: inherit; color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sort-btn:hover { border-color: var(--accent-border); color: var(--accent); }
.sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
.results-info { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }

/* Table View */
.table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
thead { background: #fafafa; position: sticky; top: 0; }
th { padding: 0.85rem 0.9rem; text-align: left; font-weight: 600; color: var(--text-secondary);
  border-bottom: 2px solid var(--border); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
td { padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--bg-card-hover); }
.title-link { color: var(--text); text-decoration: none; font-weight: 500; }
.title-link:hover { color: var(--accent); }
.cat-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.72rem;
  background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }

/* Card View removed */

.empty { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
.title-fallback { color: var(--text-secondary); font-style: italic; }
.footer { text-align: center; padding: 2rem; font-size: 0.72rem; color: var(--text-muted); border-top: 1px solid var(--border); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease both; }

@media (max-width: 640px) {
  .header h1 { font-size: 1.3rem; }
  .stats-bar { gap: 1.5rem; }
  .toolbar-inner { flex-direction: row; justify-content: flex-end; }

}
</style>
</head>
<body>
<div class="header">
  <h1>📕 小红书作品爬取</h1>
  <p class="sub">关键词「{{KEYWORD}}」</p>
</div>
<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="sTotal">{{TOTAL_COUNT}}</div><div class="stat-label">作品总数</div></div>
  <div class="stat-item"><div class="stat-value" id="sShown">{{TOTAL_COUNT}}</div><div class="stat-label">当前展示</div></div>
  <div class="stat-item"><div class="stat-value" id="sAvgLike">-</div><div class="stat-label">平均点赞</div></div>
</div>
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="like" onclick="sortBy('like',this)">👍 点赞</button>
      <button class="sort-btn" data-sort="collect" onclick="sortBy('collect',this)">⭐ 收藏</button>
      <button class="sort-btn" data-sort="share" onclick="sortBy('share',this)">📤 分享</button>
      <button class="sort-btn" data-sort="comment" onclick="sortBy('comment',this)">💬 评论</button>
      <button class="sort-btn" data-sort="time" onclick="sortBy('time',this)">🕐 最新</button>
    </div>
  </div>
</div>
<div class="container">
  <div class="results-info" id="resultsInfo"></div>
  <div id="tableView" class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>笔记标题</th><th>作者</th>
        <th>收藏</th><th>分享</th><th>评论</th><th>点赞</th><th>发布时间</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div id="emptyView" class="empty" style="display:none">😔 没有匹配的作品，请尝试其他关键词</div>
</div>
<footer class="footer">Generated at {{TIMESTAMP}} · Powered by redfox.hk</footer>
<script>
const RAW = {{WORKS_DATA}};
let data = (RAW||[]).map((w,i) => ({...w, _idx: i+1}));
let filtered = [...data];
let currentSort = 'like';

const $ = id => document.getElementById(id);

function fmt(n) {
  if (n == null) return '0';
  n = Number(n);
  if (isNaN(n)) return '0';
  if (n >= 10000) return (n/10000).toFixed(1)+'w';
  return n.toLocaleString();
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtTime(t) { if(!t) return '-'; return t.replace(/^\d{4}-/,'').replace(/:\d{2}$/,'').replace(/-/g,'/'); }

function sortData(arr, by) {
  const keyMap = {like:'like_count',collect:'collect_count',share:'share_count',comment:'comment_count',time:'publish_time'};
  const k = keyMap[by]||'like_count';
  return [...arr].sort((a,b) => {
    if (by==='time') return (b[k]||'').localeCompare(a[k]||'');
    return (Number(b[k])||0) - (Number(a[k])||0);
  });
}

function renderTable() {
  const tb = $('tableBody');
  tb.innerHTML = '';
  filtered.forEach((w,i) => {
    const tr = document.createElement('tr');
    tr.className = 'fade-in';
    tr.style.animationDelay = Math.min(i*0.02,0.5)+'s';
    const titleDisplay = w.title && w.title !== '-'
      ? (w.work_url ? `<a class="title-link" href="${esc(w.work_url)}" target="_blank">${esc(w.title)}</a>` : esc(w.title))
      : `<span class="title-fallback">-</span>`;
    tr.innerHTML = `<td>${i+1}</td>
      <td>${titleDisplay}</td>
      <td>${esc(w.author)||'-'}</td>
      <td>${fmt(w.collect_count)}</td><td>${fmt(w.share_count)}</td>
      <td>${fmt(w.comment_count)}</td><td>${fmt(w.like_count)}</td>
      <td>${fmtTime(w.publish_time)}</td>`;
    tb.appendChild(tr);
  });
}

function render() {
  const has = filtered.length > 0;
  $('tableView').style.display = has ? 'block' : 'none';
  $('emptyView').style.display = has ? 'none' : 'block';
  $('sShown').textContent = filtered.length;
  $('resultsInfo').textContent = `共 ${data.length} 条作品`;
  if (has) renderTable();
}

function sortBy(by, btn) {
  currentSort = by;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = sortData(filtered, by);
  render();
}

function doFilter() {
  filtered = sortData([...data], currentSort);
  render();
}

// 计算平均点赞
const likes = data.map(w => Number(w.like_count)||0);
const avg = likes.length ? Math.round(likes.reduce((a,b)=>a+b,0)/likes.length) : 0;
$('sAvgLike').textContent = fmt(avg);

// 初始渲染
filtered = sortData(filtered, 'like');
render();
</script>
</body>
</html>
