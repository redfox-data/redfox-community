<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI抖音信息源 - {{DATE}}</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-primary: #0f0f0f;
    --bg-secondary: #1a1a1a;
    --bg-card: #1e1e1e;
    --bg-card-hover: #252525;
    --text-primary: #f0ece6;
    --text-secondary: #9a9590;
    --text-muted: #666;
    --accent: #25F4EE;
    --accent-light: #5CF7F2;
    --accent-glow: rgba(37, 244, 238, 0.15);
    --accent-border: rgba(37, 244, 238, 0.3);
    --border: rgba(255, 255, 255, 0.06);

    --font-display: 'Archivo Black', Impact, sans-serif;
    --font-body: 'Space Grotesk', -apple-system, sans-serif;

    --title-size: clamp(1.8rem, 4vw, 3.5rem);
    --h2-size: clamp(1.2rem, 2.5vw, 1.8rem);
    --h3-size: clamp(1rem, 1.8vw, 1.3rem);
    --body-size: clamp(0.8rem, 1.2vw, 0.95rem);
    --small-size: clamp(0.7rem, 0.9vw, 0.8rem);

    --radius: 12px;
    --radius-sm: 8px;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    font-family: var(--font-body);
    font-size: var(--body-size);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    padding: clamp(1rem, 3vw, 3rem);
}

.report-header {
    text-align: center;
    padding: clamp(2rem, 5vw, 4rem) 0 clamp(1rem, 2vw, 1.5rem);
    max-width: 900px;
    margin: 0 auto;
}

.report-header h1 {
    font-family: var(--font-display);
    font-size: var(--title-size);
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
}

.report-header .subtitle {
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 1.2rem;
}

.date-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1.2rem 0;
}

.date-display .date-text {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3vw, 2.4rem);
    color: var(--text-primary);
    letter-spacing: 0.02em;
}

.date-nav-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.date-nav-btn:hover {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-glow);
}

.stats-bar {
    display: flex;
    justify-content: center;
    gap: clamp(1.5rem, 4vw, 3rem);
    padding: clamp(1rem, 2vw, 1.5rem) clamp(1rem, 3vw, 2rem);
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    max-width: 700px;
    margin: clamp(0.5rem, 1vw, 1rem) auto clamp(2rem, 4vw, 3rem);
    flex-wrap: wrap;
}

.stat-item { text-align: center; min-width: 80px; }

.stat-value {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: var(--accent);
    line-height: 1.2;
}

.stat-label {
    font-size: var(--small-size);
    color: var(--text-secondary);
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* ── 分区卡片网格 ── */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    gap: clamp(1rem, 2vw, 1.5rem);
    max-width: 1200px;
    margin: 0 auto;
}

.category-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s var(--ease-out-expo), border-color 0.3s ease;
}

.category-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-border);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: clamp(1rem, 2vw, 1.3rem) clamp(1rem, 2vw, 1.5rem);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
}

.card-number {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: rgba(0, 0, 0, 0.3);
    line-height: 1;
}

.card-category {
    flex: 1;
    font-family: var(--font-body);
    font-size: var(--h3-size);
    font-weight: 700;
    color: #fff;
}

.card-count {
    font-size: var(--small-size);
    color: rgba(255, 255, 255, 0.8);
    font-weight: 500;
    background: rgba(0, 0, 0, 0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
}

.card-body {
    padding: clamp(0.8rem, 1.5vw, 1.2rem) clamp(1rem, 2vw, 1.5rem);
    max-height: 520px;
    overflow-y: auto;
}

.card-body::-webkit-scrollbar { width: 4px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.card-body::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ── 文章列表项 ── */
.article-item {
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
}

.article-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.article-cover {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-secondary);
}

.article-info {
    flex: 1;
    min-width: 0;
}

.article-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
    text-decoration: none;
    font-size: var(--body-size);
    font-weight: 500;
    line-height: 1.5;
    transition: color 0.2s ease;
}

.article-title:hover {
    color: var(--accent);
}

.article-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.3rem;
    font-size: var(--small-size);
    color: var(--text-muted);
    flex-wrap: wrap;
    gap: 0.3rem;
}

.author {
    color: var(--text-secondary);
}

.metrics {
    display: flex;
    gap: 0.8rem;
}

.metric {
    white-space: nowrap;
}

.report-footer {
    text-align: center;
    padding: clamp(2rem, 4vw, 3rem) 0 1rem;
    color: var(--text-muted);
    font-size: var(--small-size);
}

.report-footer .powered { margin-top: 0.5rem; color: var(--text-secondary); }

.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
}

.reveal.visible { opacity: 1; transform: translateY(0); }

.category-card:nth-child(1) { transition-delay: 0.05s; }
.category-card:nth-child(2) { transition-delay: 0.1s; }
.category-card:nth-child(3) { transition-delay: 0.15s; }
.category-card:nth-child(4) { transition-delay: 0.2s; }
.category-card:nth-child(5) { transition-delay: 0.25s; }
.category-card:nth-child(6) { transition-delay: 0.3s; }
.category-card:nth-child(7) { transition-delay: 0.35s; }
.category-card:nth-child(8) { transition-delay: 0.4s; }

@media (max-width: 600px) {
    .stats-bar { gap: 1rem; }
    .stat-item { min-width: 60px; }
    .cards-grid { grid-template-columns: 1fr; }
    .date-display .date-text { font-size: 1.3rem; }
    .article-cover { width: 56px; height: 56px; }
}

@media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
}
</style>
</head>
<body>

<header class="report-header">
    <h1>AI抖音信息源</h1>
    <p class="subtitle">每日 AI 热门作品 · 互动量靠前的爆款一网打尽</p>

    <div class="date-display">
        <button class="date-nav-btn" id="prevDay" title="前一天">&larr;</button>
        <span class="date-text">{{DATE_CN}}</span>
        <button class="date-nav-btn" id="nextDay" title="后一天">&rarr;</button>
    </div>

</header>

<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value">{{TOPIC_COUNT}}</div>
        <div class="stat-label">分类</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_COUNT}}</div>
        <div class="stat-label">作品</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{AVG_LIKES}}</div>
        <div class="stat-label">平均点赞</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{TOTAL_SHARES}}</div>
        <div class="stat-label">总分享</div>
    </div>
</div>

<div class="cards-grid" id="cardsGrid">
{{CATEGORY_CARDS}}
</div>

<footer class="report-footer">
    <p>Generated at {{TIMESTAMP}}</p>
    <p class="powered">Powered by AI抖音信息源 Skill</p>
</footer>

<script>
(function() {
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
    });

    var currentDate = '{{DATE}}';
    function navigateDate(offset) {
        var parts = currentDate.split('-');
        var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        d.setDate(d.getDate() + offset);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        var newDate = y + '-' + m + '-' + day;
        var newFile = '抖音AI日报_' + newDate + '.html';
        window.location.href = newFile;
    }

    document.getElementById('prevDay').addEventListener('click', function() { navigateDate(-1); });
    document.getElementById('nextDay').addEventListener('click', function() { navigateDate(1); });
})();
</script>

</body>
</html>
